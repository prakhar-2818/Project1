<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

canvas {
    position: fixed;
    top:0;
    left:0;
    z-index:0;
}

.main { position: relative; z-index:10; }
</style>
</head>

<body>

<!-- 🔥 SAME 3D BACKGROUND -->
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const cubes = [];
for(let i=0;i<500;i++){
    const cube = new THREE.Mesh(
        new THREE.BoxGeometry(0.3,0.3,0.3),
        new THREE.MeshBasicMaterial({ color:0x00ffff, wireframe:true })
    );
    cube.position.set(
        (Math.random()-0.5)*20,
        (Math.random()-0.5)*20,
        (Math.random()-0.5)*20
    );
    scene.add(cube);
    cubes.push(cube);
}

function animate(){
    requestAnimationFrame(animate);
    cubes.forEach(c=>{
        c.rotation.x+=0.01;
        c.rotation.y+=0.01;
        c.position.z+=0.05;
        if(c.position.z>5) c.position.z=-20;
    });
    renderer.render(scene,camera);
}
animate();
</script>

<!-- UI -->
<div class="main flex items-center justify-center min-h-screen">

<div class="w-[460px] p-8 rounded-2xl text-white 
bg-white/5 backdrop-blur-2xl border border-white/10 shadow-2xl">

<h2 class="text-3xl font-bold mb-2">Create Account</h2>
<p class="text-white/60 mb-6">Start your architectural journey today.</p>

<!-- FULL NAME -->
<label class="text-xs text-white/50 uppercase">Full Name</label>
<input placeholder="Enter your full name"
class="w-full p-3 mb-4 bg-white/5 border border-white/10 rounded-xl"/>

<!-- EMAIL + OTP -->
<label class="text-xs text-white/50 uppercase">Email Address</label>
<div class="flex gap-2 mb-4">
<input id="email" placeholder="name@example.com"
class="flex-1 p-3 bg-white/5 border border-white/10 rounded-xl"/>

<button onclick="sendOTP()" 
class="px-4 border border-white/20 rounded-xl hover:bg-white/10 transition text-sm">
SEND OTP
</button>
</div>

<!-- OTP -->
<label class="text-xs text-white/50 uppercase">Verification Code</label>
<div class="relative mb-4">
<input id="otpInput" placeholder="• • • • • •"
class="w-full p-3 bg-white/5 border border-white/10 rounded-xl tracking-[8px] text-center"/>

<span class="absolute right-3 top-3 text-xs text-white/40">
Expires in 02:00
</span>
</div>

<!-- PASSWORD -->
<div class="grid grid-cols-2 gap-3 mb-4">

<div>
<label class="text-xs text-white/50 uppercase">Password</label>
<input type="password" placeholder="••••••"
class="w-full p-3 bg-white/5 border border-white/10 rounded-xl"/>
</div>

<div>
<label class="text-xs text-white/50 uppercase">Confirm</label>
<input type="password" placeholder="••••••"
class="w-full p-3 bg-white/5 border border-white/10 rounded-xl"/>
</div>

</div>

<!-- TERMS -->
<label class="flex items-start text-sm text-white/60 mb-6">
<input type="checkbox" class="mr-2 mt-1">
I agree to the 
<span class="text-cyan-400 mx-1">Terms of Service</span> and 
<span class="text-cyan-400 ml-1">Privacy Policy</span>
</label>

<!-- BUTTON -->
<button class="w-full py-3 rounded-full bg-gradient-to-r from-blue-400 to-blue-600 font-bold hover:scale-105 transition">
Register Account →
</button>

<!-- FOOTER -->
<p class="text-center text-sm text-white/60 mt-6">
Already have an account?
<a href="login.html" class="text-cyan-400">Login</a>
</p>

</div>

</div>

<!-- OTP LOGIC -->
<script>
function sendOTP(){
    const email = document.getElementById("email").value;

    if(!email){
        alert("Enter email first");
        return;
    }

    alert("OTP sent to " + email);
}
</script>

</body>
</html>
