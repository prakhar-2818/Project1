<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; background:black; font-family:Inter; }

canvas { position:fixed; top:0; left:0; z-index:0; }
.main { position:relative; z-index:10; max-width:1200px; margin:auto; }

.glass {
    background: linear-gradient(135deg, rgba(0,255,255,0.08), rgba(0,0,0,0.6));
    backdrop-filter: blur(25px);
    border:1px solid rgba(255,255,255,0.1);
}

.statBox {
    transition:0.3s;
}
.statBox:hover{
    background: rgba(0,255,255,0.1);
    box-shadow:0 0 20px rgba(0,255,255,0.4);
    transform:scale(1.05);
}
</style>
</head>

<body>

<!-- 🔥 3D BG -->
<script>
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.z=6;

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const cubes=[];
for(let i=0;i<120;i++){
    const c=new THREE.Mesh(
        new THREE.BoxGeometry(),
        new THREE.MeshBasicMaterial({color:0x00ffff,wireframe:true})
    );
    c.position.set((Math.random()-0.5)*25,(Math.random()-0.5)*25,(Math.random()-0.5)*25);
    scene.add(c);
    cubes.push(c);
}

function animate(){
    requestAnimationFrame(animate);
    cubes.forEach(c=>{
        c.rotation.x+=0.01;
        c.rotation.y+=0.01;
        c.position.z+=0.05;
        if(c.position.z>6) c.position.z=-25;
    });
    renderer.render(scene,camera);
}
animate();
</script>

<div class="main p-6">

<!-- 🔥 PROFILE HEADER -->
<div class="relative mb-16">

    <!-- BANNER -->
    <div class="h-40 rounded-2xl bg-gradient-to-r from-cyan-500/20 via-blue-500/20 to-purple-500/20"></div>

    <!-- CARD -->
    <div class="glass p-8 rounded-2xl -mt-20 flex flex-col md:flex-row items-center md:items-start gap-8 shadow-2xl">

        <!-- IMAGE -->
        <img id="userImg" 
        class="w-32 h-32 rounded-2xl object-cover border-2 border-cyan-400 shadow-[0_0_20px_rgba(0,255,255,0.4)]">

        <!-- INFO -->
        <div class="flex-1 w-full text-center md:text-left">

            <h2 id="userName" class="text-3xl font-bold text-cyan-300 mb-1"></h2>
            <p id="userEmail" class="text-white/60 mb-4"></p>

            <!-- BUTTONS -->
            <div class="flex gap-3 justify-center md:justify-start mb-6">

                <button class="px-4 py-2 rounded-full 
                bg-white/5 border border-white/10
                hover:bg-cyan-400/10 hover:border-cyan-400/40 transition">
                    Edit Profile
                </button>

                <button onclick="logout()" 
                class="px-4 py-2 rounded-full 
                bg-white/5 border border-white/10
                hover:bg-red-500/20 hover:border-red-400/40 transition">
                    Logout
                </button>

            </div>

            <!-- STATS -->
            <div class="flex flex-wrap gap-4 justify-center md:justify-start">

                <div class="statBox glass px-6 py-3 rounded-xl text-center min-w-[100px]">
                    <p id="itemCount" class="text-xl font-bold text-cyan-300">0</p>
                    <p class="text-white/60 text-sm">Items</p>
                </div>

                <div class="statBox glass px-6 py-3 rounded-xl text-center min-w-[100px]">
                    <p id="wishCount" class="text-xl font-bold text-cyan-300">0</p>
                    <p class="text-white/60 text-sm">Wishlist</p>
                </div>

                <div class="statBox glass px-6 py-3 rounded-xl text-center min-w-[100px]">
                    <p id="buyerCount" class="text-xl font-bold text-cyan-300">0</p>
                    <p class="text-white/60 text-sm">Buyers</p>
                </div>

            </div>

        </div>

    </div>

</div>

<!-- 🔥 PRODUCTS -->
<h2 class="text-2xl font-bold text-cyan-300 mb-6">Your Products</h2>

<div id="myItems" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

</div>

<script>

// USER
function loadUser(){
    var user = JSON.parse(localStorage.getItem("user"));
    if(!user) return;

    document.getElementById("userName").innerText = user.name;
    document.getElementById("userEmail").innerText = user.email;
    document.getElementById("userImg").src = user.photo || 
    "https://cdn-icons-png.flaticon.com/512/149/149071.png";
}

// ITEMS
function loadItems(){
    var user = JSON.parse(localStorage.getItem("user"));
    var products = JSON.parse(localStorage.getItem("products")) || [];
    var container = document.getElementById("myItems");
    container.innerHTML = "";

    if(!user) return;

    var myItems = products.filter(function(p){
        return p.owner === user.name;
    });

    document.getElementById("itemCount").innerText = myItems.length;
    document.getElementById("wishCount").innerText = 0;
    document.getElementById("buyerCount").innerText = myItems.length * 2;

    if(myItems.length === 0){
        container.innerHTML = '<p class="text-white/50">No items yet</p>';
        return;
    }

    for(var i=0;i<myItems.length;i++){
        var p = myItems[i];

        container.innerHTML +=
        '<div class="glass p-4 rounded-xl hover:scale-105 transition">' +
            '<img src="'+p.image+'" class="h-40 w-full object-cover rounded mb-2">' +
            '<h3 class="text-white">'+p.title+'</h3>' +
            '<p class="text-gray-400">₹'+p.price+'</p>' +
            '<button onclick="deleteItem('+i+')" class="mt-2 w-full bg-red-500 py-2 rounded">Delete</button>' +
        '</div>';
    }
}

// DELETE
function deleteItem(index){
    var user = JSON.parse(localStorage.getItem("user"));
    var products = JSON.parse(localStorage.getItem("products")) || [];

    var myItems = products.filter(function(p){
        return p.owner === user.name;
    });

    var item = myItems[index];

    products = products.filter(function(p){
        return p !== item;
    });

    localStorage.setItem("products", JSON.stringify(products));
    loadItems();
}

// LOGOUT
function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

// INIT
loadUser();
loadItems();

</script>

</body>
</html>
